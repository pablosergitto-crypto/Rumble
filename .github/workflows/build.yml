name: Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build Application
        run: |
          xcodebuild build-for-testing \
            -workspace DPIBypass.xcworkspace \
            -scheme DPIBypass \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA Structure
        run: |
          mkdir -p Payload
          cp -r /Users/runner/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphoneos/DPIBypass.app Payload/
          zip -r DPIBypass.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DPIBypass-Unsigned-IPA
          path: DPIBypass.ipa
